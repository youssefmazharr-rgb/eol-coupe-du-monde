        .container { max-width: 1400px; margin: 0 auto; padding: 40px 30px; flex: 1; }
        .page { display: none; }
        .page.active { display: block; }

        .section-title { font-size: 24px; font-weight: 700; margin-bottom: 30px; color: var(--primary-dark); }

            align-items: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .match-date { color: var(--text-secondary); font-size: 12px; font-weight: 500; text-transform: uppercase; margin-bottom: 6px; }

            border-radius: 20px;
            font-size: 12px;

        .status-open { background: #dcfce7; color: #166534; }

            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;

            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            margin-top: 8px;

        .time-remaining {

            color: var(--warning);

            border-radius: 8px;
            text-align: center;
            margin-top: 12px;

        function showMainApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('userName').textContent = currentUser.fullName;

            if (isAdmin) {
                document.getElementById('adminBtn').style.display = 'block';
                loadAdminPanel();
            }

            syncServerTime();
        }

        function syncServerTime() {
            if (!db) {
                serverTime = new Date();
                loadResults();
                loadMatches();
                loadRanking();
                return;
            }

            db.ref('/.info/serverTimeOffset').once('value', (snapshot) => {
                const offset = snapshot.val() || 0;
                serverTime = new Date(Date.now() + offset);
                loadResults();
                loadMatches();
                loadRanking();
            });
        }

        function loadResults() {
            if (!db) return;
            db.ref('results').once('value').then(snapshot => {
                matchResults = {};
                snapshot.forEach(child => {
                    matchResults[child.key] = child.val().score;
                });
            });
        }

        function getMatchStatus(match) {
            const [day, month, year] = match.date.split('/');
            const [hours, minutes] = match.time.split(':');
            const matchTime = new Date(year, month - 1, day, hours, minutes, 0);
            return serverTime < matchTime ? 'OUVERT' : 'FERMÉ';
        }

        function getTimeRemaining(match) {
            const [day, month, year] = match.date.split('/');
            const [hours, minutes] = match.time.split(':');
            const matchTime = new Date(year, month - 1, day, hours, minutes, 0);
            const diff = matchTime - serverTime;

            if (diff <= 0) return null;

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            return `${h}h ${m}min`;
        }

        function calculatePoints(userScore, realScore) {
            if (!userScore || !realScore) return 0;
            
            const [u1, u2] = userScore.split('-').map(Number);
            const [r1, r2] = realScore.split('-').map(Number);

            if (u1 === r1 && u2 === r2) return 20;
            if ((u1 > u2 && r1 > r2) || (u1 < u2 && r1 < r2) || (u1 === u2 && r1 === r2)) return 10;
            return 0;
        }

        function loadMatches() {
            const container = document.getElementById('matchesContainer');
            
            container.innerHTML = allMatches.map(match => {
                const status = getMatchStatus(match);
                const timeLeft = getTimeRemaining(match);
                const isOpen = status === 'OUVERT';
                const result = matchResults[match.id];

                return `
                    <div class="match-card">
                        <div class="match-header">
                            <div>
                                <div class="match-date">Groupe ${match.group}</div>
                                <div class="team">
                                    <span class="team-flag">${match.team1.split(' ')[0]}</span>
                                    <span class="team-name">${match.team1.substring(2)}</span>
                                </div>
                            </div>
                            <div class="match-center">
                                <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">
                                    📅 ${match.date} ⏰ ${match.time}
                                </div>
                                <span class="match-status ${isOpen ? 'status-open' : 'status-closed'}">
                                    ${isOpen ? '✓ OUVERT' : '❌ FERMÉ'}
                                </span>
                                ${timeLeft ? `<div class="time-remaining">⏱️ ${timeLeft}</div>` : ''}
                            </div>
                            <div>
                                <div class="match-date" style="visibility: hidden;">-</div>
                                <div class="team">
                                    <span class="team-flag">${match.team2.split(' ')[0]}</span>
                                    <span class="team-name">${match.team2.substring(2)}</span>
                                </div>
                            </div>
                        </div>

                        ${result ? `
                            <div class="result-box">
                                <div class="result-score">${result}</div>
                                <div style="font-size: 12px; color: var(--text-secondary);">Résultat Final</div>
                            </div>
                        ` : ''}

                        <div style="display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px;">
                            <div></div>
                            <div>
                                <div style="display: flex; gap: 6px; align-items: center; justify-content: center;">
                                    <input type="number" class="score-input" data-match="${match.id}" data-pos="1" 
                                           placeholder="0" min="0" max="20" ${!isOpen ? 'disabled' : ''}>
                                    <span style="color: var(--text-secondary); font-weight: 500;">-</span>
                                    <input type="number" class="score-input" data-match="${match.id}" data-pos="2" 
                                           placeholder="0" min="0" max="20" ${!isOpen ? 'disabled' : ''}>
                                </div>
                                ${isOpen ? `<button class="btn-small" onclick="savePronostic(${match.id})">Pronostiquer</button>` : `<button class="btn-small" disabled>Fermé</button>`}
                            </div>
                            <div></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function savePronostic(matchId) {
            const input1 = document.querySelector(`input[data-match="${matchId}"][data-pos="1"]`);
            const input2 = document.querySelector(`input[data-match="${matchId}"][data-pos="2"]`);
            
            const score1 = input1.value;
            const score2 = input2.value;

            if (!score1 || !score2 || score1 === '' || score2 === '') {
                alert('Veuillez remplir les deux scores');
                return;
            }

            if (db) {
                db.ref('pronostics/' + currentUser.id + '/' + matchId).set(score1 + '-' + score2).then(() => {
                    alert('✓ Pronostic sauvegardé!');
                });
            }
        }

        function loadRanking() {
            if (!db) return;

            db.ref('users').orderByChild('points').limitToLast(50).once('value').then(snapshot => {
                const users = [];
                snapshot.forEach(child => {
                    users.push({ id: child.key, ...child.val() });
                });
                users.reverse();

                const tbody = document.getElementById('rankingBody');
                tbody.innerHTML = users.map((user, index) => `
                    <tr>
                        <td><span class="rank-badge">${index + 1}</span></td>
                        <td>${user.firstName} ${user.lastName}</td>
                        <td><span class="points-badge">${user.points || 0} pts</span></td>
                        <td>-</td>
                    </tr>
                `).join('');
            });
        }

        function loadAdminPanel() {
            const select = document.getElementById('matchSelect');
            select.innerHTML = '<option value="">-- Sélectionner un match --</option>' +
                allMatches.map(m => `<option value="${m.id}">${m.team1.substring(2)} vs ${m.team2.substring(2)}</option>`).join('');
        }

        function recordResult() {
            const matchId = document.getElementById('matchSelect').value;
            const score1 = document.getElementById('score1').value;
            const score2 = document.getElementById('score2').value;

            if (!matchId || score1 === '' || score2 === '') {
                alert('Veuillez remplir tous les champs');
                return;
            }

            if (db) {
                db.ref('results/' + matchId).set({ score: score1 + '-' + score2 }).then(() => {
                    document.getElementById('successMsg').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('successMsg').style.display = 'none';
                    }, 3000);
                    
                    document.getElementById('matchSelect').value = '';
                    document.getElementById('score1').value = '';
                    document.getElementById('score2').value = '';
                    
                    loadResults();
                    loadMatches();
                });
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function logout() {
            currentUser = null;
            isAdmin = false;
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('adminCode').value = '';
        }
    </script>
</body>
</html>
