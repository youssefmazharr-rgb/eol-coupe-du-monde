        .admin-section { background: white; padding: 30px; border-radius: 14px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07); margin-bottom: 30px; }

        function handleLogin(e) {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const adminCode = document.getElementById('adminCode').value;

            currentUser = {
                id: firstName.toLowerCase() + '_' + lastName.toLowerCase(),
                fullName: firstName + ' ' + lastName
            };

            isAdmin = (adminCode === '199707');

            db.ref('users/' + currentUser.id).set({
                name: currentUser.fullName,
                points: 0
            });

            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userName').textContent = currentUser.fullName;

            if (isAdmin) {
                document.getElementById('adminBtn').style.display = 'block';
                loadAdminPanel();
            }

            loadData();
        }

        function loadData() {
            db.ref('pronostics/' + currentUser.id).on('value', snapshot => {
                myPronostics = snapshot.val() || {};
                loadMatches();
            });

            db.ref('results').on('value', snapshot => {
                results = snapshot.val() || {};
                loadMatches();
                calculatePoints();
            });

            loadRanking();
        }

        function calculatePoints() {
            let totalPoints = 0;

            for (let matchId in myPronostics) {
                if (results[matchId]) {
                    const [u1, u2] = myPronostics[matchId].split('-').map(Number);
                    const [r1, r2] = results[matchId].split('-').map(Number);

                    if (u1 === r1 && u2 === r2) {
                        totalPoints += 20;
                    } else if ((u1 > u2 && r1 > r2) || (u1 < u2 && r1 < r2) || (u1 === u2 && r1 === r2)) {
                        totalPoints += 10;
                    }
                }
            }

            db.ref('users/' + currentUser.id + '/points').set(totalPoints);
        }

                                </div>
                            </div>
                        </div>

                        ${myProno ? `<div style="margin-top: 8px; padding: 8px; background: #dbeafe; border-radius: 6px; font-size: 13px; color: #1e40af;">Votre pronostic: ${myProno}</div>` : ''}

                            <div>
                                <div style="display: flex; gap: 6px; align-items: center; justify-content: center;">

        function saveProno(id) {
            const s1 = document.getElementById('p1_' + id).value;
            const s2 = document.getElementById('p2_' + id).value;

            if (!s1 || !s2) {
                alert('Remplissez les deux scores');

            }

            db.ref('pronostics/' + currentUser.id + '/' + id).set(s1 + '-' + s2).then(() => {

            const select = document.getElementById('matchSelect');
            select.innerHTML = '<option value="">-- Sélectionner --</option>' +
                allMatches.map(m => `<option value="${m.id}">${m.team1.substring(2)} vs ${m.team2.substring(2)}</option>`).join('');
        }

        function recordResult() {
            const id = document.getElementById('matchSelect').value;
            const s1 = document.getElementById('score1').value;
            const s2 = document.getElementById('score2').value;

            if (!id || s1 === '' || s2 === '') {
                alert('Remplissez tous les champs');
                return;
            }

            db.ref('results/' + id).set(s1 + '-' + s2).then(() => {
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('successMsg').style.display = 'none';
                }, 3000);

                document.getElementById('matchSelect').value = '';
                document.getElementById('score1').value = '';
                document.getElementById('score2').value = '';
            });
        }

        function loadRanking() {
            db.ref('users').orderByChild('points').limitToLast(50).once('value').then(snapshot => {
                const users = [];
                snapshot.forEach(child => {
                    users.push({ name: child.val().name, points: child.val().points || 0 });
                });
                users.reverse();

                const tbody = document.getElementById('rankingBody');
                tbody.innerHTML = users.map((user, index) => `
                    <tr>
                        <td style="font-weight: bold; color: #0099ff;">${index + 1}</td>
                        <td>${user.name}</td>
                        <td><span class="points-badge">${user.points} pts</span></td>
                    </tr>
                `).join('');
            });
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function logout() {
            currentUser = null;
            isAdmin = false;
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('adminCode').value = '';
        }
    </script>
</body>
</html>
